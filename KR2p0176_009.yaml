body:
  text: 徭律御中發徵乏弗行貲二甲失期三日到五日誶六日到旬貲一盾過旬貲一甲其得殹及詣水雨除興興徒以為邑中之紅者令𥿍堵卒歲未卒堵壞司空將紅及君子主堵者有罪令其徒復垣之勿計為䌛縣葆禁苑公馬牛苑興徒以斬垣離散及補繕之輒以效苑吏苑吏循之未卒歲或壞䦼令縣復興徒為之而勿計為䌛卒歲而或䦼壞過三堵以上縣葆者補繕之三堵以下及雖未盈卒歲而或盗䦼道出入令苑輒自補繕之縣所葆禁苑之傅山遠山其土惡不能雨夏有壞者勿稍補繕至秋毋雨時而以䌛為之其近田恐獸及馬牛出食稼者縣嗇夫材興有田其旁者無貴賤以田少多出人以垣繕之不得為䌛縣毋敢擅壞更公舍官府及廷其有欲壞更殹必𤅊之欲以城旦舂益為公舍官府及補繕之為之勿𤅊縣為恒事及𤅊有為殹吏程攻贏員及减員自二日以上為不察上之所興其程攻而不當者如縣然度攻必令司空與匠度之毋獨令匠其不審以律論度者而以其實為䌛徒計䌛律
