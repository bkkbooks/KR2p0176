body:
  text: 效實官佐史柀免徙官嗇夫必與去者效代者節官嗇夫免而效不備代者與居吏坐之故吏弗效新吏居之未盈歲去者與居吏坐之新吏弗坐其盈歲雖弗效新吏與居吏坐之去者弗坐它如律效倉屚㱙禾粟及積禾粟而敗之其不可食者不盈百石以下誶官嗇夫百石以上到千石資官嗇夫一甲過千石以上資官嗇夫二甲令官嗇夫冗吏共賞敗禾粟禾粟雖敗而尚可食殹程之以其耗石數論負之效度禾芻稿而不備十分一以下令復其故數過十分以上先索以稟人而以律論其不備效入禾萬石一積而比黎之為戶籍之曰其廥禾若干石倉嗇夫某佐某史某稟人某是縣入之縣嗇夫若丞及倉鄉相雜以封印之而遺倉嗇夫及離邑倉佐主稟者各一戶以氣人其出禾有書其出者如入禾然效嗇夫免而效效者見其封及隄以效之勿度縣唯倉所自封印是度縣終歲而為出凡曰某廥出禾若干石其餘禾若干石倉嗇夫及佐史其有免去者新倉嗇夫新佐史主廥者必以廥籍度之其有所疑謁縣嗇夫縣嗇夫令人復度及與雜出之禾贏入之而以律論不備者效禾芻稿積廥有贏不備而匿弗謁及者移贏以賞不備羣它物當負賞而偽出之以彼賞皆與盜同法大嗇夫丞智而弗罪以平罪人律論之有與主廥者共賞不備至計而上廥籍內史入禾發屚倉必令長吏相雜以見之芻稿如禾效效公器贏不備以齎律論及賞毋齎者乃直之效公器不久刻者官嗇夫資一盾效
