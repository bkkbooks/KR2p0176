body:
  text: 金布律官府受錢者千錢一畚以丞令印印不盈千者亦封印之錢善不善雜實之出錢獻封丞令乃發用之百姓市用錢美惡雜之勿敢異金布布袤八尺福廣二尺五寸布惡其廣袤不如式者不行金布錢十一當一布其出入錢以當金布以律金布賈市居列者及官府之吏毋敢擇行錢布擇行錢布者列伍長弗告吏循之不謹皆有罪金布有買及買殹各嬰其賈小物不能各一錢者勿嬰金布官相輸者以書告其出計之年受者以入計之八月九月中其有輸計其輸所遠近不能逮其輸所之計移計其後年計毋相繆工獻輸官者皆深以其年計之金布律都官有秩吏及離官嗇夫養各一人其佐史與共養十人車牛一兩見牛者一人都官之佐史冗者十人養一人十五人車牛一兩見牛者一人不盈十人者各與其官長共養車牛都官佐史不盈十五人者七人以上鼠車牛僕不盈七人者三人以上鼠養一人小官毋嗇夫者以此鼠僕車牛豤生者食其母日粟一斗旬五日而止之別䋽以叚之金布律有責於公及貲贖者居它縣輒移居縣責之公有責百姓未賞亦移其縣縣賞金布律百姓叚公器及有責未賞其日以收責之而弗收責其人死亡及隸臣妾有亡公器畜生者以其日月减其衣食毋過三分取一其所亡眾計之終歲衣食不以稍賞令居之其弗令居之其人死亡令其官嗇夫及吏主者代賞之金布縣都官坐效計以負賞者已論嗇夫即以其直錢分負其官長及冗吏而人與參辨券以效少內少內以收責之其入贏者亦官與辨券入之其責毋敢隃歲隃歲而弗入及不如令者皆以律論之金布官嗇夫免復為嗇夫而坐其故官以貲賞及有它責貧窶毋以賞者稍减其秩月食以賞之弗得居其免殹令以律居之官嗇夫免效其官而有不備者令與其稗官分如其事吏坐官以負賞未而死及有罪以收抉出其分其已分而死及恒作官府以負責牧將公畜生而殺亡之未賞及居之未備而死皆出之毋責妻同居金布縣都官以七月糞公器不可繕者有久識者靡𧈪之其金及鐵器入以為銅都官輸大內內受買之盡七月而觱都官遠大內者輸縣縣受買之糞其有物不可以須時求先買以書時謁其狀內史凡糞其不可買而可以為薪及蓋者用之毋用乃燔之金布傳車大車輪葆繕參邪可殹韋革紅器相補繕取不可葆繕者乃糞之金布受衣者夏衣以四月盡六月稟之冬衣以九月盡十一月稟之過時者勿稟後計冬衣來年囚有寒者為褐衣為𢄐布一用枲三斤為褐以稟衣大褐一用枲十八斤直六十錢中褐一用枲十四斤直𠦜六錢小褐一用枲十一斤直卅六錢已稟衣有餘褐十以上輸大內與計偕都官有用其官隸臣妾舂城旦毋用在咸陽者致其衣大內在它縣者致衣從事之縣縣大內皆聽其官致以律稟衣金布稟衣者隸臣府隸之毋妻者及城旦冬人百一十錢夏五十五錢其小者冬七十七錢夏𠦜四錢舂冬人五十五錢夏𠦜四錢其小者冬𠦜四錢夏卅三錢隸臣妾之老及小不能自衣者如舂衣亡不仁其主及官者衣如隸臣妾金布
