body:
  text: 內史雜縣各告都官在其縣者寫其官之用律內史雜都官歲上出器求補者數上會九月內史內史雜有事請殹必以書毋口請毋請內史雜官嗇夫免其官亟置嗇夫過二月弗置嗇夫令丞為不從令內史雜除佐必當壯以上毋除士五新傅苑嗇夫不存縣為置守如廄律內史雜令史毋從事官府非史子殹毋敢學學室犯令者有罪內史雜下吏能書者毋敢從史之事內史雜侯司寇及羣下吏毋敢為官府佐史及禁苑憲盜內史雜有實官縣料者各有衡石羸斗甬期計其官毋假百姓不用者正之如用者內史雜有實官高其垣墻它垣屬焉者獨高其置芻廥及倉茅蓋者令人勿紤舍非其官人殹毋敢舍焉善宿衛閉門輒靡其旁火慎守唯敬有不從令而亡有敗失火官吏有重罪大嗇夫丞任之內史雜毋敢以火入臧府書府中吏已收臧官嗇夫及吏夜更行官毋火乃閉門戶令令史循其廷府節新為吏舍毋依臧府書府內史雜
