body:
  text: 廄苑律以四月七月十月正月膚田牛卒歲以正月大課之最賜田嗇夫壺酉束脯為旱者除一更賜牛長日三旬殿者誶田嗇夫罰冗皂者二月其以牛田牛減潔治主者寸十有里課之最者賜田典日旬殿治卅廄苑律假鐵器銷敝不勝而毀者為用書受勿責廄苑將牧公馬牛馬牛死者亟謁死所縣縣亟診而入之其入之其弗亟而令敗者令以其未敗直賞之其小隸臣疾死者告其之其非疾死者以其診書告官論之其大廄中廄宮廄馬牛殹以其筋革角及其賈錢效其人詣其官其乘服公馬牛亡馬者而死縣縣診而雜買其肉即入其筋革角及索入其賈錢錢少律者令其人備之而告官官告馬牛縣出之今課縣都官公服牛各一課卒歲十牛以上而三分一死不盈十牛以下及受服牛者卒歲死牛三以上吏主者徒食牛者及令丞皆有罪內史課縣大倉課都官及受服者
