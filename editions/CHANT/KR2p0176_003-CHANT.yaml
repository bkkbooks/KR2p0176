body:
  text: 倉律入禾倉萬石一積而比黎之為戶縣嗇夫若丞及倉鄉相雜以印之而遺倉嗇夫及離邑倉佐主稟者各一戶以氣自封印皆輒出餘之索而更為發戶嗇夫免效者發見雜封者以隄效之而復雜封之勿度縣唯倉自封印者是度縣出禾非入者是出之令度之度之當堤令出之其不備出者負之其贏者入之雜出禾者勿更入禾未盈萬石而欲增積焉其前入者是增積可殹其它人是增積積者必先度故積當堤乃入焉後節不備後入者獨負之而書入禾增積者之名事邑里於廥籍萬石之積及未盈萬石而被出者毋敢增積櫟陽二萬石一積咸陽十萬一積其出入禾增積如律令長吏相雜以入禾倉及發見之粟積義積之勿令敗倉入禾稼芻稾輒為廥籍上內史芻稾各萬石一積咸陽二萬一積其出入增積及效如禾倉禾芻稾積𡩡出日上贏不備縣廷出之未𡩡而已備者言縣廷廷令長吏雜封其廥與出之輒上數廷其少欲一縣之可殹廥才都邑當者與雜出之倉不備令其故吏與新吏雜先𡩡出之其故吏弗欲勿強其毋故吏者令有秩之吏令史主與倉雜出之𡩡而論不備雜者勿更更之而不備令令丞與賞不備倉程禾黍以書言年別其數以稟人倉計禾別黃白青勿以稟人倉稻後禾孰計稻後年已穫上數別粲穤秙稻別粲穤之襄歲異積之勿增積以給客到十月牒書數上內史倉縣上食者籍及它費大倉與計偕都官以計時讎食者籍倉種稻麻畝用二斗大半斗禾麥畝一斗黍荅畝大半斗叔畝半斗利田疇其有不盡此數者可殹其有本者稱議種之倉縣遺麥以為種用者殽禾以臧之倉粟一石六斗大半斗舂之為䊪米一石䊪米一石為鑿米九斗九斗為毀米八斗稻禾一石有米委賜稟禾稼公盡九月其人弗取之勿鼠倉為粟廿斗舂為米十斗十斗粲毀米六斗大半斗麥十斗為䵂三斗叔荅麻十五斗為一石稟毀粺者以十斗為石倉宦者都官吏都官人有事上為將令縣貣之輒移其稟縣稟縣以减其稟已稟者移居縣責之倉有事軍及下縣者齎食毋以傳貣縣倉月食者已致稟而公使有傳食及告歸盡月不來者止其後朔食而以其來日致其食有秩吏不止倉駕傳馬一食禾其顧來有一食禾皆八馬共其數駕毋過日一食駕縣馬勞有益壺禾之倉律妾未使而衣食公百姓有欲叚者叚之令就衣食焉吏輒柀事之倉律隸臣妾其從事公隸臣月禾二石隸妾一石半其不從事勿稟小城旦隸臣作者月禾一石半石未能作者月禾一石小妾舂作者月禾一石二斗半斗未能作者月禾一石嬰兒之毋母者各半石雖有母而與其母冗居公者亦稟之禾月半石隸臣田者以二月月稟二石半石到九月盡而止其半石舂月一石半石隸臣城旦高不盈六尺五寸隸妾舂高不盈六尺二寸皆為小高五尺二寸皆作之倉小隸臣妾以八月傅為大隸臣妾以十月益食倉更隸妾節有急事總冗以律稟食不急勿總倉城旦之垣及它事而勞與垣等者旦半夕參其守署及為它事者參食之其病者稱議食之令吏主城旦舂舂司寇白粲操土攻參食之不操土攻以律食之倉日食城旦盡月而以其餘益為後九月稟所城旦為安事而益其食以犯令律論吏主者减舂城旦月不盈之稟倉免隸臣妾隸臣妾垣及為它事與垣等者食男子旦半夕參女子參倉食𩚚囚日少半斗倉隸臣欲以人丁粼者二人贖許之其老當免老小高五尺以下及隸妾欲以丁粼者一人贖許之贖者皆以男子以其贖為隸臣女子操敃紅及服者不得贖邊縣者復數其縣倉畜鷄離倉用犬者畜犬期足猪鷄之息子不用者買之別計其錢倉
