body:
  text: 置吏律縣都官十二郡免除吏及佐羣官屬以十二月朔日免除盡三月而止之其有死亡及故有夬者為補之毋須時置吏律除吏尉已除之乃令視事及遣之所不當除而敢先見事及相聽以遺之以律論之嗇夫之送見它官者不得除其故官佐吏以之新官置吏律官嗇夫節不存令君子毋害者若令史守官毋令官佐史守置吏律
