body:
  text: 睡虎地秦墓竹簡秦律十八種田律雨為湗及誘粟輒以書言湗稼誘粟及豤田畼毋稼者頃數稼已生後而雨亦輒言雨少多所利頃數早及暴風雨水潦𧈸䖵羣它物傷稼者亦輒言其頃數近縣令輕足行其書遠縣令郵行之盡八月之田律春二月毋敢伐材木山林及雍隄水不夏月毋敢夜草為灰取生荔麛𠨫鷇毋毒魚鱉置穽罔到七月而縱之唯不幸死而伐綰享者是不用時邑之紤皂及它禁苑者麛時毋敢將犬以之田百姓犬入禁苑中而不追獸及捕獸者勿敢殺其追獸及捕獸者殺之河禁所殺犬皆完入公其它禁苑殺者食其肉而入皮田律入頃芻稾以其受田之數無豤不豤頃入芻三石稾二石芻自黃及束以上皆受之入芻稾相輸度可殹田律禾芻稾徹木薦輒上石數縣廷勿用復以薦蓋田律乘馬服牛稟過二月弗稟弗致者皆止勿稟致稟大田而毋恒籍者以其致到日稟之勿深致田律百姓居田舍者毋敢𥂰酉田嗇夫部佐謹禁御之有不從令者有罪田律
