body:
  text: 軍爵律從軍當以勞論及賜未拜而死有罪法耐䙴其後及法耐䙴者皆不得受其爵及賜其已拜賜未受而死及法耐䙴者鼠賜軍爵律欲歸爵二級以免親父母為隸臣妾者一人及隸臣斬首為公士謁歸公士而免故妻隸妾一人者許之免以為庶人工隸臣斬首及人為斬首以免者皆令為工其不完者以為隱官工軍爵
