body:
  text: 傳食律御史卒人使者食稗米半斗醬駟分升一采羹給之韭蔥其有爵者自官士大夫以上爵食之使者之從者食糲米半斗僕少半斗傳食律不更以下到謀人稗米一斗醬半升采羹芻稿各半石宦奄如不更傳食律上造以下到官佐史毋爵者及卜史司御寺府糲米一斗有采羹鹽草二分升二傳食律
