body:
  text: 工律為器同物者其小大短長廣夾必等工律為計不同程者毋同其出工律縣及工室聽官為正衡石贏斗用升毋過歲壺有工者勿為正叚試即正工律邦中之䌛及公事官舍其叚公叚而有死亡者亦令其徒舍人任其叚如從興戍然工律公甲兵各以其官名刻久之其不可刻久者以丹若䰍書之其叚百姓甲兵必書其久受之以久入叚而而毋久及非其官之久也皆沒入公以齎律責之工公器官久久之不可久者以䰍久之其或叚公器歸之久必乃受之敝而糞者靡𧈪其久官輒告叚器者曰器敝久恐靡者遝其未靡謁更其久其久靡不可智者令齎賞叚器者其事已及免官輒收其叚弗亟收者有罪其叚者死亡有罪毋責也吏代賞毋擅叚公器者擅叚公器者有罪毀傷公器及者令賞
