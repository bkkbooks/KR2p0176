body:
  text: 司空縣都官用貞栽為傰牏及載縣鐘虞用轢皆不勝任而折及大車轅不勝任折轂軸上皆為用而出之司空官府假公車牛者假人所或私用公車牛及假人食牛不善牛訾不攻間車車空失大車轂軸𥾲及不芥車車蕃蓋強折列其主車牛者及吏官長皆有罪司空官長及吏以公車牛稟其月食及公牛乘馬之稟可殹官有金錢者自為買脂膠毋金錢者乃月為言脂膠期為鐵攻以攻公大車司空一脂攻間大車一輛用膠一兩脂二錘攻間其扁解以數分膠以之為車不勞稱議脂之司空令縣及都官取柳及木楘可用書者方之以書毋方者乃用版其縣山之多茾者以茾纏書毋茾者以蒲藺以枲萷之各以其時多積之司空有罪以資贖及有責於公以其令日問之其弗能入及賞以令日居之日居八錢公食者日居六錢居官府公食者男子參女子駟公士以下居贖刑罪死罪者居於城旦舂毋赤其衣勿枸櫝欙杕鬼薪白粲羣下吏毋耐者人奴妾居贖資責於城旦皆赤其衣枸櫝欙杕將司之其或亡之有罪葆子以上居贖刑以上到贖死居於官府皆勿將司所弗問而久毄之大嗇夫丞及官嗇夫有罪居資贖責欲代者耆弱相當許之作務及賈而負責者不得代一室二人以上居資贖責而莫見其室者出其一人令相為兼居之居資贖責者或欲籍人與并居之許之毋除繇戍凡不能自衣者公衣之令居其衣如律然其日未備而柀入錢者許之以日當刑而不能自衣食者亦衣食而令居之官作居資贖責而遠其計所官者盡八月各以其作日及衣數告其計所官毋過九月而觱到其官官相紤者盡九月而告其計所官計之其作年百姓有資贖責而有一臣若一妾有一馬若一牛而欲居者許司隸臣妾城旦舂之司寇居資贖責毄城旦舂者勿責衣食其與城旦舂作者衣食之如城旦舂隸臣有妻妻更及有外妻者責衣人奴妾毄城旦舂貣衣食公日未備而死者出其衣食司空毄城旦舂公食當責者石卅錢司空居資贖責者歸田農種時治苗時各二旬司空毋令居資贖責將城旦舂城旦司寇不足以將令隸臣妾將居資贖責當與城旦舂作者及城旦傅堅城旦舂當將司者草人城旦司寇一人將司寇不免城旦勞三歲以上者以為城旦司寇司空城旦舂衣赤衣冒赤𢅒拘櫝欙杕之仗城旦勿將司其名將司者將司之舂城旦出繇者毋敢之市及留舍闠外當行市中者回勿行城旦舂毀折瓦器鐵器木器為大車折楘輒治之直一錢治十直草錢以上孰治之出其器弗輒治吏主者負其半司空司寇勿以為僕養守官府及除有為殹有上令除之必復請之司空百姓有母及同牲為隸妾非適罪殹而欲為冗邊五歲毋賞興日以免一人為庶人許之或贖䙲欲入錢者日八錢司空
